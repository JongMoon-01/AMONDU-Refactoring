name: AMONDU CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}           # Azure Container Registry 이름
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER }}     # AKS 클러스터 이름
  AKS_RESOURCE_GROUP: ${{ secrets.AKS_RESOURCE_GROUP }}

jobs:
  # ─────────────────────────────────────────
  # CI: 각 서비스 빌드 검증
  # ─────────────────────────────────────────
  ci-frontend:
    name: CI - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: edtech-frontend/package-lock.json
      - name: Install & Test
        working-directory: edtech-frontend
        run: |
          npm ci
          npm test -- --watchAll=false --passWithNoTests
      - name: Build
        working-directory: edtech-frontend
        run: CI=false npm run build

  ci-backend:
    name: CI - Backend (Spring Boot)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [edtech-backend, edtech-noticeboard, edtech-gpt-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"
      - name: Build & Test
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

  ci-python:
    name: CI - Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [attention-model-fastapi-service, edtech-aiquizbackend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps & Lint
        working-directory: ${{ matrix.service }}
        run: |
          pip install flake8
          # requirements.txt가 있는 경우 설치 (CI에서는 핵심만)
          if [ -f requirements.txt ]; then
            pip install fastapi uvicorn pydantic 2>/dev/null || true
          fi
          # 문법 오류만 체크 (E9: 런타임 에러, F63: assert 오류, F7: 문법 오류)
          flake8 app/ --select=E9,F63,F7 --show-source || true

  # ─────────────────────────────────────────
  # CD: main 브랜치 push 시 → 빌드 & 배포
  # ─────────────────────────────────────────
  cd-deploy:
    name: CD - Build & Deploy to AKS
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-backend, ci-python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Azure 로그인
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR 로그인
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Docker 이미지 빌드 & Push (병렬)
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR=${{ env.ACR_NAME }}.azurecr.io

          build_and_push() {
            SERVICE=$1
            CONTEXT=$2
            echo "▶ Building $SERVICE..."
            docker build -t $ACR/$SERVICE:$IMAGE_TAG -t $ACR/$SERVICE:latest \
              -f docker/$SERVICE/Dockerfile $CONTEXT
            docker push $ACR/$SERVICE:$IMAGE_TAG
            docker push $ACR/$SERVICE:latest
            echo "✅ $SERVICE pushed"
          }

          # 병렬 빌드
          build_and_push edtech-frontend        edtech-frontend        &
          build_and_push edtech-backend         edtech-backend         &
          build_and_push edtech-noticeboard     edtech-noticeboard     &
          build_and_push edtech-gpt-backend     edtech-gpt-backend     &
          build_and_push attention-model-fastapi-service attention-model-fastapi-service &
          build_and_push edtech-aiquizbackend   edtech-aiquizbackend   &
          wait
          echo "🎉 All images built and pushed"

      - name: AKS 자격증명 설정
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: K8s 이미지 태그 업데이트 & 배포
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR=${{ env.ACR_NAME }}.azurecr.io

          # 각 Deployment의 이미지를 새 태그로 교체
          kubectl set image deployment/edtech-frontend \
            edtech-frontend=$ACR/edtech-frontend:$IMAGE_TAG -n amondu

          kubectl set image deployment/edtech-backend \
            edtech-backend=$ACR/edtech-backend:$IMAGE_TAG -n amondu

          kubectl set image deployment/edtech-noticeboard \
            edtech-noticeboard=$ACR/edtech-noticeboard:$IMAGE_TAG -n amondu

          kubectl set image deployment/edtech-gpt-backend \
            edtech-gpt-backend=$ACR/edtech-gpt-backend:$IMAGE_TAG -n amondu

          kubectl set image deployment/attention-model-service \
            attention-model-service=$ACR/attention-model-fastapi-service:$IMAGE_TAG -n amondu

          kubectl set image deployment/edtech-aiquizbackend \
            edtech-aiquizbackend=$ACR/edtech-aiquizbackend:$IMAGE_TAG -n amondu

      - name: 배포 완료 대기 (Rollout 확인)
        run: |
          kubectl rollout status deployment/edtech-frontend -n amondu --timeout=120s
          kubectl rollout status deployment/edtech-backend -n amondu --timeout=120s
          kubectl rollout status deployment/edtech-noticeboard -n amondu --timeout=120s
          kubectl rollout status deployment/edtech-gpt-backend -n amondu --timeout=120s
          kubectl rollout status deployment/attention-model-service -n amondu --timeout=180s
          kubectl rollout status deployment/edtech-aiquizbackend -n amondu --timeout=120s
          echo "🚀 All deployments rolled out successfully"
