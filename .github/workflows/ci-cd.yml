name: AMONDU CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # CI: Frontend
  # ─────────────────────────────────────────
  ci-frontend:
    name: CI - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: edtech-frontend/package-lock.json
      - name: Install
        working-directory: edtech-frontend
        run: npm ci
      - name: Test
        working-directory: edtech-frontend
        run: npm test -- --watchAll=false --passWithNoTests
      - name: Build
        working-directory: edtech-frontend
        run: CI=false npm run build

  # ─────────────────────────────────────────
  # CI: Backend (Spring Boot)
  # ─────────────────────────────────────────
  ci-backend:
    name: CI - Backend (Spring Boot)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [edtech-backend, edtech-noticeboard, edtech-gpt-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"
      - name: Build
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

  # ─────────────────────────────────────────
  # CI: Python Services
  # ─────────────────────────────────────────
  ci-python:
    name: CI - Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [attention-model-fastapi-service, edtech-aiquizbackend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Lint
        working-directory: ${{ matrix.service }}
        run: |
          pip install flake8
          flake8 app/ --select=E9,F63,F7 --show-source || true

  # ─────────────────────────────────────────
  # CD: Azure AKS 배포 (TODO: Azure Secrets 등록 후 활성화)
  # 활성화 방법: 아래 if: false 제거 후 GitHub Secrets에 등록
  # - AZURE_CREDENTIALS, ACR_NAME, AKS_CLUSTER, AKS_RESOURCE_GROUP
  # ─────────────────────────────────────────
  cd-deploy:
    name: CD - Deploy to AKS
    runs-on: ubuntu-latest
    needs: [ci-frontend, ci-backend, ci-python]
    if: false
    steps:
      - uses: actions/checkout@v4
      - name: Azure 로그인
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: ACR 로그인
        run: az acr login --name ${{ secrets.ACR_NAME }}
      - name: Docker 이미지 빌드 & Push
        run: |
          IMAGE_TAG=${{ github.sha }}
          ACR=${{ secrets.ACR_NAME }}.azurecr.io
          for SERVICE in edtech-frontend edtech-backend edtech-noticeboard edtech-gpt-backend attention-model-fastapi-service edtech-aiquizbackend; do
            docker build -t $ACR/$SERVICE:$IMAGE_TAG -t $ACR/$SERVICE:latest \
              -f docker/$SERVICE/Dockerfile $SERVICE &
          done
          wait
      - name: AKS 배포
        run: |
          az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER }}
          kubectl rollout restart deployment -n amondu
