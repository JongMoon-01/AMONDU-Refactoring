spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/edtech?allowPublicKeyRetrieval=true&useSSL=false
    username: aivle17
    password: aivle0517
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  web:
    resources:
      static-locations: classpath:/static/

  # ⑤ Kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: edtech-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.edtech.edtech_backend.kafka.event"

# ⑥ Actuator — /actuator/prometheus 노출
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    tags:
      application: edtech-backend

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

llm:
  base-url: http://127.0.0.1:8082

jwt:
  secret: '87YlPD4ykG0WHHB6s2JKGSWLYQDVCIzT8YebMT0Z1EFpYXhAsZo6RyAa88KeRuWddvp1vIXihU3X9oPxVXuhsw=='
  expiration-ms: 3600000
