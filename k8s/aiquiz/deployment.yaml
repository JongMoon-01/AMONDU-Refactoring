apiVersion: apps/v1
kind: Deployment
metadata:
  name: edtech-aiquizbackend
  namespace: amondu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edtech-aiquizbackend
  template:
    metadata:
      labels:
        app: edtech-aiquizbackend
    spec:
      containers:
        - name: edtech-aiquizbackend
          image: edtech-aiquizbackend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: OPENAI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: chroma-data
              mountPath: /app/chroma_db_data
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  namespace: amondu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
