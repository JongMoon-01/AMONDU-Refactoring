apiVersion: apps/v1
kind: Deployment
metadata:
  name: edtech-backend
  namespace: amondu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edtech-backend
  template:
    metadata:
      labels:
        app: edtech-backend
    spec:
      containers:
        - name: edtech-backend
          image: edtech-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
