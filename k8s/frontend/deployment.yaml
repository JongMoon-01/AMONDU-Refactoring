apiVersion: apps/v1
kind: Deployment
metadata:
  name: edtech-frontend
  namespace: amondu
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edtech-frontend
  template:
    metadata:
      labels:
        app: edtech-frontend
    spec:
      containers:
        - name: edtech-frontend
          image: edtech-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
