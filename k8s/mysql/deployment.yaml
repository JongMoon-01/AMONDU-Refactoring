apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: amondu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: amondu
            - name: MYSQL_USER
              value: amondu
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: amondu-secrets
                  key: MYSQL_PASSWORD
          args: ["--default-authentication-plugin=mysql_native_password"]
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: amondu
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
